<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Career Assessment - SkillSync</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
    .input {
        width: 100%;
        padding: 12px;
        margin-bottom: 12px;
        background: black;
        border: 1px solid #2563eb;
        color: white;
        border-radius: 8px;
    }
    .input:focus {
        outline: none;
        border-color: #60a5fa;
        box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
    }
</style>
</head>

<body class="bg-gradient-to-br from-black via-slate-900 to-blue-950 min-h-screen p-6">

<div class="max-w-4xl mx-auto bg-black/80 p-8 rounded-2xl shadow-2xl border border-blue-500/30">

    <h2 class="text-4xl font-bold text-center text-blue-400 mb-8">
        AI Career Assessment 🚀
    </h2>

    <div class="mb-6">
        <input id="name" placeholder="Name" class="input">
        <input id="stream" placeholder="Stream (e.g., Science, Commerce, Arts)" class="input">
        <input id="hobbies" placeholder="Hobbies" class="input">
        <input id="favorite_subject" placeholder="Favorite Subject" class="input">
        <input id="work_preference" placeholder="Work Preference (e.g., Remote, Office, Field)" class="input">
    </div>

    <select id="education_level" onchange="loadAptitude()" class="input mb-6">
        <option value="">Select Education Level</option>
        <option value="10th">10th</option>
        <option value="12th">12th</option>
        <option value="undergraduate">Undergraduate</option>
        <option value="postgraduate">Postgraduate</option>
    </select>

    <div id="aptitudeSection" class="hidden mb-6">
        <h3 class="text-blue-400 mb-4 font-semibold text-xl">Aptitude Questions</h3>
        <div id="aptitudeQuestions" class="space-y-4"></div>
    </div>

    <button id="submitBtn" onclick="submitData()"
        class="w-full bg-blue-700 hover:bg-blue-800 py-4 rounded-xl text-white font-bold text-lg transition duration-200 shadow-lg disabled:opacity-50 disabled:cursor-not-allowed">
        Submit Assessment
    </button>

    <div id="result" class="mt-6 text-center text-blue-300 font-semibold text-lg"></div>

</div>

<script>
function loadAptitude(){
    const level = document.getElementById("education_level").value;
    const container = document.getElementById("aptitudeQuestions");
    const section = document.getElementById("aptitudeSection");

    container.innerHTML = "";

    if(!level){
        section.classList.add("hidden");
        return;
    }

    section.classList.remove("hidden");

    let questions=[];

    if(level==="10th"){
        questions=[
            ["1. Basic Math: If a dozen apples cost ₹120, how much do 3 apples cost?", "₹30", 1, "₹40", 0],
            ["2. Logical Pattern: What number comes next: 5, 10, 15, 20, ...?", "25", 1, "30", 0],
            ["3. Verbal Analogy: 'Bird' is to 'Fly' as 'Fish' is to...?", "Swim", 1, "Walk", 0],
            ["4. Problem Solving: A train travels at 60 km/hr. How far will it travel in 2 hours?", "120 km", 1, "60 km", 0],
            ["5. English: Which word means the opposite of 'Happy'?", "Sad", 1, "Joyful", 0]
        ];
    } 


    if(level==="12th"){
        questions=[
            ["1. Ratio: The ratio of boys to girls in a class is 3:2. If there are 30 students total, how many are boys?", "18", 1, "12", 0],
            ["2. Logic: If Person A is taller than B, and B is taller than C, who is the shortest?", "Person C", 1, "Person A", 0],
            ["3. Percentages: If 20% of a number is 50, what is the complete number?", "250", 1, "100", 0],
            ["4. Pattern: What letter comes next in the sequence: A, C, E, G, ...?", "I", 1, "H", 0],
            ["5. Vocabulary: Which word means the opposite of 'Abundant'?", "Scarce", 1, "Plentiful", 0]
        ];
    }


    if(level==="undergraduate"){
        questions=[
            ["1. Logical Sequence: What comes next in the series: 2, 6, 12, 20, X??", "30", 1, "28", 0],
            ["2. If the probability of an event happening is 0.2, what is the probability of it NOT happening?", "0.8", 1, "0.0", 0],
            ["3. Quantitative: If a product costs ₹400 and is discounted by 25%, what is the final price?", "300", 1, "350", 0],
            ["4. Direction: If you walk North, turn right, walk forward, and then turn right again, which direction are you facing??", "south", 1, "east", 0],
            ["5. Analytical: If 5 machines take 5 minutes to make 5 devices, how long would it take 100 machines to make 100 devices?", "5 minutes", 1, "100 minutes Mean", 0]
        ];
    }

    if(level==="postgraduate"){
        questions=[
            ["1. Cognitive Math: A bat and a ball cost ₹110 in total. The bat costs ₹100 more than the ball. How much does the ball cost?", "₹5", 1, "₹10", 0],
            ["2. Syllogism: All cars are vehicles. No vehicle is a bicycle. Therefore, no car is a bicycle.", "True", 1, "False", 0],
            ["3. Odd One Out: Which number does not belong in this group: 9, 16, 25, 36, 42, 49?", "42", 1, "36", 0],
            ["4. Advanced Logic: If 'A + B' means A is the brother of B, and 'A × B' means A is the father of B, what does 'P + Q × R' mean?", "P is the uncle of R", 1, "P is the brother of R", 0],
            ["5. Vocabulary: Which word is the closest synonym for 'Meticulous'?", "Careful", 1, "Careless", 0]
        ];
    }



    questions.forEach((q,i)=>{
        container.innerHTML+=`
        <div class="bg-gray-900/50 p-4 rounded-lg border border-gray-700">
            <p class="mb-3 text-blue-200 font-medium">${q[0]}</p>
            <select id="a${i}" class="input !mb-0">
                <option value="0" disabled selected>Select your answer...</option>
                <option value="${q[2]}">${q[1]}</option>
                <option value="${q[4]}">${q[3]}</option>
            </select>
        </div>
        `;
    });
}

async function submitData(){
    const level = document.getElementById("education_level").value;
    const name = document.getElementById("name").value;

    if(!name || !level){
        alert("Please enter your name and select an education level!");
        return;
    }

    let aptitude_score = 0;
    let allAnswered = true;

    for(let i=0; i<5; i++){
        const element = document.getElementById(`a${i}`);
        if(element){
            if(element.value === "0" && element.options[element.selectedIndex].disabled) {
                allAnswered = false;
            } else {
                aptitude_score += parseInt(element.value);
            }
        }
    }

    if (!allAnswered) {
        alert("Please answer all 5 aptitude questions before submitting!");
        return;
    }

    const data = {
        name: name,
        stream: document.getElementById("stream").value,
        education_level: level,
        hobbies: document.getElementById("hobbies").value,
        favorite_subject: document.getElementById("favorite_subject").value,
        work_preference: document.getElementById("work_preference").value,
        interest_answers: [],
        personality_answers: [],
        aptitude_score: aptitude_score
    };

    // UI Loading State
    const resultDiv = document.getElementById("result");
    const submitBtn = document.getElementById("submitBtn");
    
    resultDiv.innerText = "🧠 AI is analyzing your profile... Please wait.";
    submitBtn.disabled = true;
    submitBtn.innerText = "Processing...";

    try{
        // THIS IS THE UPDATED LINE POINTING TO YOUR RENDER BACKEND
        const response = await fetch("https://skillsync-ai-2-844x.onrender.com/analyze",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify(data)
        });

        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }

        const result = await response.json();
        
        // Save the result to local storage
        localStorage.setItem("careerResult", result.result);
        
        // Redirect to the new results page
        window.location.href = "results.html";

    }catch(error){
        console.error("Fetch error:", error);
        resultDiv.innerText = "❌ Error: Could not connect to the backend. Please try again.";
        submitBtn.disabled = false;
        submitBtn.innerText = "Submit Assessment";
    }
}
</script>

</body>
</html>
