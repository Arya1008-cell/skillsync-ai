<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Career Assessment - SkillSync</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
    .input {
        width: 100%;
        padding: 12px;
        margin-bottom: 12px;
        background: black;
        border: 1px solid #2563eb;
        color: white;
        border-radius: 8px;
    }
    .input:focus {
        outline: none;
        border-color: #60a5fa;
        box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
    }
</style>
</head>

<body class="bg-gradient-to-br from-black via-slate-900 to-blue-950 min-h-screen p-6">

<div class="max-w-4xl mx-auto bg-black/80 p-8 rounded-2xl shadow-2xl border border-blue-500/30">

    <h2 class="text-4xl font-bold text-center text-blue-400 mb-8">
        AI Career Assessment 🚀
    </h2>

    <div class="mb-6">
        <input id="name" placeholder="Name" class="input">
        <input id="stream" placeholder="Stream (e.g., Science, Commerce, Arts)" class="input">
        <input id="hobbies" placeholder="Hobbies" class="input">
        <input id="favorite_subject" placeholder="Favorite Subject" class="input">
        <input id="work_preference" placeholder="Work Preference (e.g., Remote, Office, Field)" class="input">
    </div>

    <select id="education_level" onchange="loadAptitude()" class="input mb-6">
        <option value="">Select Education Level</option>
        <option value="10th">10th</option>
        <option value="12th">12th</option>
        <option value="undergraduate">Undergraduate</option>
        <option value="postgraduate">Postgraduate</option>
    </select>

    <div id="aptitudeSection" class="hidden mb-6">
        <h3 class="text-blue-400 mb-4 font-semibold text-xl">Aptitude Questions</h3>
        <div id="aptitudeQuestions" class="space-y-4"></div>
    </div>

    <button id="submitBtn" onclick="submitData()"
        class="w-full bg-blue-700 hover:bg-blue-800 py-4 rounded-xl text-white font-bold text-lg transition duration-200 shadow-lg disabled:opacity-50 disabled:cursor-not-allowed">
        Submit Assessment
    </button>

    <div id="result" class="mt-6 text-center text-blue-300 font-semibold text-lg"></div>

</div>

<script>
function loadAptitude(){
    const level = document.getElementById("education_level").value;
    const container = document.getElementById("aptitudeQuestions");
    const section = document.getElementById("aptitudeSection");

    container.innerHTML = "";

    if(!level){
        section.classList.add("hidden");
        return;
    }

    section.classList.remove("hidden");

    let questions=[];

    if(level==="10th"){
        questions=[
            ["1. 15 + 5 = ?", "20", 1, "25", 0],
            ["2. A square has how many sides?", "4", 1, "5", 0],
            ["3. 10 × 2 = ?", "20", 1, "30", 0],
            ["4. The sun rises from the?", "East", 1, "West", 0],
            ["5. 5² = ?", "25", 1, "20", 0]
        ];
    }

    if(level==="12th"){
        questions=[
            ["1. If 2x + 4 = 10, what is x?", "3", 1, "2", 0],
            ["2. What is the derivative of x²?", "2x", 1, "x", 0],
            ["3. What comes next: 3, 6, 12, ?", "24", 1, "18", 0],
            ["4. Formula for the area of a circle?", "πr²", 1, "2πr", 0],
            ["5. Probability of getting heads on a coin flip?", "1/2", 1, "1/3", 0]
        ];
    }

    if(level==="undergraduate"){
        questions=[
            ["1. What is the time complexity of binary search?", "O(log n)", 1, "O(n)", 0],
            ["2. SQL is primarily used for?", "Database Management", 1, "UI Design", 0],
            ["3. What does CPU stand for?", "Central Processing Unit", 1, "Computer Processing Unit", 0],
            ["4. HTTP stands for?", "HyperText Transfer Protocol", 1, "High Text Transfer", 0],
            ["5. Standard deviation measures what?", "Data Spread", 1, "Data Mean", 0]
        ];
    }

    if(level==="postgraduate"){
        questions=[
            ["1. Regression algorithms are primarily used for?", "Prediction", 1, "Sorting", 0],
            ["2. AI is considered a subset of?", "Computer Science", 1, "Physics", 0],
            ["3. Big-O notation describes?", "Algorithm efficiency", 1, "Memory size limitations", 0],
            ["4. Neural networks are inspired by?", "The Human Brain", 1, "CPU Architecture", 0],
            ["5. Cloud computing primarily offers?", "On-demand computing services", 1, "Hardware components only", 0]
        ];
    }

    questions.forEach((q,i)=>{
        container.innerHTML+=`
        <div class="bg-gray-900/50 p-4 rounded-lg border border-gray-700">
            <p class="mb-3 text-blue-200 font-medium">${q[0]}</p>
            <select id="a${i}" class="input !mb-0">
                <option value="0" disabled selected>Select your answer...</option>
                <option value="${q[2]}">${q[1]}</option>
                <option value="${q[4]}">${q[3]}</option>
            </select>
        </div>
        `;
    });
}

async function submitData(){
    const level = document.getElementById("education_level").value;
    const name = document.getElementById("name").value;

    if(!name || !level){
        alert("Please enter your name and select an education level!");
        return;
    }

    let aptitude_score = 0;
    let allAnswered = true;

    for(let i=0; i<5; i++){
        const element = document.getElementById(`a${i}`);
        if(element){
            if(element.value === "0" && element.options[element.selectedIndex].disabled) {
                allAnswered = false;
            } else {
                aptitude_score += parseInt(element.value);
            }
        }
    }

    if (!allAnswered) {
        alert("Please answer all 5 aptitude questions before submitting!");
        return;
    }

    const data = {
        name: name,
        stream: document.getElementById("stream").value,
        education_level: level,
        hobbies: document.getElementById("hobbies").value,
        favorite_subject: document.getElementById("favorite_subject").value,
        work_preference: document.getElementById("work_preference").value,
        interest_answers: [],
        personality_answers: [],
        aptitude_score: aptitude_score
    };

    // UI Loading State
    const resultDiv = document.getElementById("result");
    const submitBtn = document.getElementById("submitBtn");
    
    resultDiv.innerText = "🧠 AI is analyzing your profile... Please wait.";
    submitBtn.disabled = true;
    submitBtn.innerText = "Processing...";

    try{
        // THIS IS THE UPDATED LINE POINTING TO YOUR RENDER BACKEND
        const response = await fetch("https://skillsync-ai-2-844x.onrender.com/analyze",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify(data)
        });

        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }

        const result = await response.json();
        
        // Save the result to local storage
        localStorage.setItem("careerResult", result.result);
        
        // Redirect to the new results page
        window.location.href = "results.html";

    }catch(error){
        console.error("Fetch error:", error);
        resultDiv.innerText = "❌ Error: Could not connect to the backend. Please try again.";
        submitBtn.disabled = false;
        submitBtn.innerText = "Submit Assessment";
    }
}
</script>

</body>
</html>
